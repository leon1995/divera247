  /api/v2/operations/results/responses:
    get:
      tags:
        - Datenrückführung
      summary: Endpunkt zum Abrufen der Rückmeldungen zu einer Operation. Die Rückmeldungen werden in Zeitslots gruppiert, die über den Leitstellen-Account konfiguriert werden können. Standardmäßig werden die Rückmeldungen aller adressierten Einheiten zurückgegeben. Sie lassen sich über die Parameter `cluster_name`, `cluster_id`, `ric_id` oder `ric_name` filtern.
      parameters:
        - name: output
          in: query
          required: false
          description: Hiermit wird gesteuert, ob die Ausgabe als JSON (`json`) oder Plain-Text (`plain`) erfolgt.
          schema:
            type: string
            enum: [plain, json]
            default: json
        - name: foreign_id
          in: query
          required: true
          description: Angabe der internen Kennung des Einsatzes im Einsatzleitsystem (Fremdschlüssel), für den die Rückmeldungen abgerufen werden sollen. Wenn dieser Parameter nicht angegeben wird, muss `number` oder `operation_id` angegeben werden.
          schema:
            type: string
            example: ise1235b67sad92309
        - name: number
          in: query
          required: true
          description: Angabe der Einsatznummer eines Einsatzes, für den die Rückmeldungen abgerufen werden sollen. Wenn dieser Parameter nicht angegeben wird, muss `operation_id` oder `foreign_id` angegeben werden.
          schema:
            type: string
            example: 2023-12345
        - name: operation_id
          in: query
          required: true
          description: Angabe des Primärschlüssels einer Operation, für die die Rückmeldungen abgerufen werden sollen. Wenn dieser Parameter nicht angegeben wird, muss `number` oder `foreign_id` angegeben werden.
          schema:
            type: integer
            example: 12345
        - name: cluster_name
          in: query
          required: false
          description: Optionaler Filter der Rückmeldungen, nach dem Namen einer Einheit.
          schema:
            type: string
            example: FF Mitte
        - name: cluster_id
          in: query
          required: false
          description: Optionaler Filter der Rückmeldungen, nach dem Primärschlüssel einer Einheit.
          schema:
            type: integer
            example: 1234
        - name: ric_name
          in: query
          schema:
            type: string
            example: HLF-20
          required: false
          description: Optionaler Filter der Rückmeldungen, nach dem Namen einer RIC.
        - name: ric_id
          in: query
          schema:
            type: integer
            example: 12346
          required: false
          description: Optionaler Filter der Rückmeldungen, nach dem Primärschlüssel einer RIC.
      responses:
        200:
          description: successful
          content:
            "application/json":
              schema:
                type: object
                properties:
                  total:
                    type: object
                    properties:
                      title:
                        type: string
                        example: Gesamt
                      slots:
                        type: array
                        items:
                          type: object
                          properties:
                            title:
                              type: string
                              example: 5 Min
                            description:
                              type: string
                              example: 5 Minuten
                            sum:
                              type: number
                              example: 6
                            tactical:
                              properties:
                                textual:
                                  type: string
                                  example: 0/1/5/6
                                components:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      title:
                                        type: string
                                        example: leader_operation
                                      description:
                                        type: string
                                        example: Zugführer
                                      count:
                                        type: number
                                        example: 0
                              type: object
                            qualifications:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: number
                                    example: 1
                                  title:
                                    type: string
                                    example: AGT
                                  description:
                                    type: string
                                    example: Atemschutzgeräteträger
                                  count:
                                    type: number
                                    example: 3
                            user_cluster_relations:
                              type: array
                              items:
                                type: object
                                properties:
                                  id:
                                    type: number
                                    example: 42
                                  ts_response:
                                    type: number
                                    example: 123456
                                  name:
                                    type: string
                                    example: Maxime Muster
                                  status_id:
                                    type: number
                                    example: 42
                                  status_name:
                                    type: string
                                    example: Ja
                                  freetext:
                                    type: string
                  clusters:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 42
                        title:
                          type: string
                          example: LZ 1
                        description:
                          type: string
                          example: Feuerwehr LZ 1
                        slots:
                          type: array
                          items:
                            type: object
                          example: []
                  rics:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                          example: 91
                        title:
                          type: string
                          example: 1-HLF-11
                        description:
                          type: string
                          example: HLF RIC Beschreibung
                        slots:
                          type: array
                          items:
                            type: object
                          example: []
            "text/plain":
              schema:
                type: string
                example: "--------------------------------------------\n
                       | Gesamt      5min  | Gesamt         10min |\n
                       |     0/1/5/6       |       1/2/9/12       |\n
                       |------------------------------------------|\n
                       --------------------------------------------\n
                       | LZ1         5min  | LZ1            10min |\n
                       |     0/1/5/6       |       1/2/9/12       |\n
                       |------------------------------------------|\n
                       --------------------------------------------\n
                       | 1-LZ-1      5min  | 1-LZ-1         10min |\n
                       |     0/1/5/6       |       1/2/9/12       |\n
                       |------------------------------------------|"
