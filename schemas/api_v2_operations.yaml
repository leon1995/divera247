openapi: 3.0.1
info:
  title: DIVERA 24/7 RESTful Webservice für Leitstellen
  description: |
    Schnittstelle um Leitstellensysteme direkt an DIVERA 24/7 anzubinden. So können Einsätze ohne Umwege über die API der Zusatzalarmierung in Sekunden sicher übertragen werden.
    ### Sie wollen ein Leitsystem an DIVERA 24/7 anbinden?
    Dann kontaktieren Sie uns über support@divera247.com oder unser [Support-Portal](https://support.divera247.com)
    ## Voraussetzung zur Verwendung der Operations-API
    1. <b>Leitstellen-Account</b><br>
    Übliche DIVERA-Einheiten haben keinen Zugriff auf die Operations-API, können jedoch Alarmierungen über die [vereinfachte API /api/alarm](?urls.primaryName=api) erzeugen. Leitstellen-Accounts unterstützen zusätzlich die hier beschriebene Operations-API.
    2. <b>RICs zuordnen</b><br>
    Für die Verwendung der Operations-API wird ein API AccessKey benötigt. Dieser ist in den [API Einstellungen des Leitstellenaccounts](https://app.divera247.com/controlcenter/index-account.html?tab=api) zu finden.
    ## Verwendung der API
    ### Hinweis zur `foreign_id`<br>
    In den unten beschriebenen Schnittstellen dient die `foreign_id` innerhalb eines Leitstellen-Accounts als eindeutige Einsatzkennung. Sie muss beim ersten Aufruf (durch das Einsatzleitsystem) vergeben werden und bei jedem folgenden zu diesem Einsatz wieder übertragen werden. Hierdurch wird sichergestellt, dass API-Aufrufe dem richtigen Einsatz zugeordnet werden können. Diese Id ist üblicherweise eine eindeutige Id innerhalb des Einsatzleitsystems und getrennt von der dem Nutzer angezeigten Einsatznummer zu sehen. Sie kann einer beliebigen, zufälligen, nutzerspezifischen Zahlen- und Zeichenkette entspringen.
    ### Schematischer Ablauf der API-Aufrufe<br>
    1. <b>Einsatzdaten übertragen</b><br>
    Zum Anlegen eines Einsatzes wird zunächst die API [/api/v2/operations](/?urls.primaryName=api%2Fv2%2Foperations#/Einsatzdaten/post_api_v2_operations) per <i>POST</i>-Request aufgerufen.
    <br><div style="background: #fca130;border-color: #fca130;border-radius: 4px;box-shadow: 0 0 3px rgba(0,0,0,.19);margin: 0 0 15px;"><div style="align-items: center;display: flex;padding: 5px;"><b>Hinweis</b><div style="padding: 0 10px;">Im ersten Schritt werden nur Einsatzdaten übertragen, eine Alarmierung von Einsatzkräften erfolgt erst durch Schritt 3!</div></div></div>
    2. <b>RICs zuordnen</b><br>
    Die RIC Zuordnung erfolgt über die API [/api/v2/operations/ric](/?urls.primaryName=api%2Fv2%2Foperations#/Einsatzmittelzuordnung/post_api_v2_operations_ric) per <i>POST</i>-Request. RICs die im späteren Verlauf eine Alarmierung erhalten sollen müssen hier zunächst dem Einsatz hinzugefügt werden.
    <br><div style="background: #fca130;border-color: #fca130;border-radius: 4px;box-shadow: 0 0 3px rgba(0,0,0,.19);margin: 0 0 15px;"><div style="align-items: center;display: flex;padding: 5px;"><b>Hinweis</b><div style="padding: 0 10px;">RICs können als Bezeichner gesehen werden und können beliebige Schemata enthalten (bspw. Namen von Maßnahmen, Fahrzeugen oder Alarmierungsschleifen)</div></div></div>
    3. <b>Alarmierung auslösen</b><br>
    Die Einsatz-Alarmierung erfolgt über die API [/api/v2/operations/alert](/?urls.primaryName=api%2Fv2%2Foperations#/Einsatzdaten/post_api_v2_operations_alert) per <i>POST</i>-Request. Standardmäßig werden alle zuvor dem Einsatz zugeordneten RICs alarmiert. Sollten in Außnamefällen nur einzelne RICs alarmiert werden, können diese als Liste übertragen werden.  <div style="background: #fca130;border-color: #fca130;border-radius: 4px;box-shadow: 0 0 3px rgba(0,0,0,.19);margin: 0 0 15px;"><div style="align-items: center;display: flex;padding: 5px;"><b>Hinweis</b><div style="padding: 0 10px;">Bei mehrfachen Aufrufen dieser API werden bereits alarmierte RICs nicht erneut alarmiert.</div></div></div>
    4. <b>(Optional) Einsatzdaten aktualisieren, weitere RICs zuordnen und alarmieren</b><br>
    Die Schritte 1-3 können beliebig wiederholt werden. Ein Update der Einsatzdaten auf Grundlage der `foreign_id` erfolgt wie in 1 beschrieben. RICs können mit Schritt 2 hinzugefügt und Schritt 3 nachalarmiert werden.<br><div style="margin: 0 0 15px;"></div>
    5. <b>(Optional) Ergebnisse und Verfügbarkeiten abfragen</b><br>
    Die im Abschnitt <i>Datenrückführung</i> beschriebenen Endpunkte können verwendet werden, um durch DIVERA bereitgestellte Rückmeldungen und Verfügbarkeiten wieder in das Einsatzleitsystem zu überführen. Eine Abfrage macht hier 30 Sekunden, 1 Minute, 3 und 5 Minuten nach Alarmierung Sinn.
  version: 4.1.0
servers:
  - url: https://app.divera247.com
tags:
  - name: Einsatzdaten
    description: Anlegen und Ändern von Einsätzen, Auslösen der Alarmierung.
  - name: Dateianhänge
    description: Verwalten von Dateianhängen von Alarmierungen
  - name: Einsatzmittelzuordnung
    description: Zuordnen und Entfernen von Einsatzmitteln
  - name: Datenrückführung
    description: Ergebnisse und Verfügbarkeiten von alarmierten Einheiten


paths:
  /api/v2/operations?foreign_id={foreign_id}:
    get:
      tags:
        - Einsatzdaten
      summary: Einsatzdatensatz abfragen
      description: Aktuell im System hinterlegte Einsatzdaten abfragen. Über den Parameter `foreign_id` kann ein gezielter Einsatz abgefragt werden. Eine Abfrage von Einsatzdaten ist für eine Schnittstelle nicht erforderlich, da Daten automatisch zusammengeführt werden. **Dieser Endpunkt sollte nur zu Entwicklungszwecken verwendet werden.**
      parameters:
        - name: foreign_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/foreignId'
      responses:
        200:
          description: Einsatz wurde erfolgreich erzeugt/aktualisiert. Die Antwort enthält den vollständigen Einsatz nach Aktualisierung
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []
  /api/v2/operations:
    get:
      tags:
        - Einsatzdaten
      summary: Laufende Einsätze abfragen
      description: Alle aktuell im System hinterlegten Einsatzdaten abfragen. Eine Abfrage von Einsatzdaten ist für eine Schnittstelle nicht erforderlich, da Daten automatisch zusammengeführt werden. **Dieser Endpunkt sollte nur zu Entwicklungszwecken verwendet werden.**
      responses:
        200:
          description: Einsatz wurde erfolgreich erzeugt/aktualisiert. Die Antwort enthält den vollständigen Einsatz nach Aktualisierung
          content:
            'application/json':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/operation-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []
    post:
      tags:
        - Einsatzdaten
      summary: Einsatz anlegen oder aktualisieren
      description: Aktuelle Einsatzdaten im System hinterlegen. Bei Angabe der selben `foreign_id`, werden Einsätze automatisch aktualisiert. Dabei überschreiben alle übertragenen Felder die alten Daten.<br><br>Das Erzeugen eines Einsatzes löst keine Alarmierung aus. Typischerweise wird nach jeder Änderung des Disponenten (Stichwort, Freitext, Ort, Adresse, usw.) der API Endpunkt mit genau den gesetzten/geänderten Feldern aufgerufen.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operation'
      responses:
        200:
          description: Einsatz wurde erfolgreich erzeugt/aktualisiert. Die Antwort enthält den vollständigen Einsatz nach Aktualisierung
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
      security:
        - Accesskey: []

