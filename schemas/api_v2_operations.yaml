  /api/v2/operations/ric?foreign_id={foreign_id}:
    get:
      tags:
        - Einsatzmittelzuordnung
      summary: Alle zugeordneten Einsatzmittel auflisten
      description: Über die Angabe von `foreign_id`, wird der Einsatz identifiziert.
      parameters:
        - name: foreign_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/foreignId'
      responses:
        200:
          description: Zugeordnete Einsatzmittel werden aufgelistet.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-ric-response-get'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []

    post:
      tags:
        - Einsatzmittelzuordnung
      summary: Einsatzmittel einem Einsatz hinzufügen
      description: >
        Einsatzmittel über ihre Kennung im Leitstellensystem einem Einsatz zuordnen. Über die Angabe von `foreign_id`, wird der Einsatz identifiziert.<br><br>Das Hinzufügen eines Einsatzmittels löst keine Alarmierung aus.<br><br><div style="background: #fca130;border-color: #fca130;border-radius: 4px;box-shadow: 0 0 3px rgba(0,0,0,.19);margin: 0 0 15px;"><div style="align-items: center;display: flex;padding: 5px;"><b>Hinweis</b><div style="padding: 0 10px;">Ist dem System eine RIC Kennung unbekannt, legt der Server die RIC automatisch neu an.</div></div></div>
      parameters:
        - name: foreign_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/foreignId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operation-ric'
      responses:
        200:
          description: Einsatzmittel wurden erfolgreich hinzugefügt oder waren (teilweise) bereits zugeordnet. Es werden alle zugeordneten Einsatzmittel aufgelistet (Primärschlüssel von DIVERA).
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-ric-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []

    put:
      tags:
        - Einsatzmittelzuordnung
      summary: Zugeordnete Einsatzmittel vollständig ersetzen
      description: Alle zuvor zugeordneten Einsatzmittel entfernen und über ihre Kennung im Leitstellensystem zu einem Einsatz neu zuordnen. Wenn für `ric_names` ein leeres Array übergeben wird, werden alle Einsatzmittel entfernt. Über die Angabe von `foreign_id`, wird der Einsatz identifiziert.
      parameters:
        - name: foreign_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/foreignId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operation-ric'
      responses:
        200:
          description: Einsatzmittel wurden erfolgreich entfernt und neu gesetzt. Es werden alle noch zugeordneten Einsatzmittel aufgelistet (Primärschlüssel von DIVERA).
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-ric-put-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []

    delete:
      tags:
        - Einsatzmittelzuordnung
      summary: Einsatzmittel von einem Einsatz entfernen
      description: Einsatzmittel über ihre Kennung im Leitstellensystem von einem Einsatz entfernen. Über die Angabe von `foreign_id`, wird der Einsatz identifiziert.
      parameters:
        - name: foreign_id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/foreignId'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/operation-ric'
      responses:
        200:
          description: Einsatzmittel wurden erfolgreich entfernt oder waren zuvor nicht zugeordnet. Es werden alle noch zugeordneten Einsatzmittel aufgelistet (Primärschlüssel von DIVERA).
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/operation-ric-delete-response'
        403:
          description: Accesskey fehlt oder ist ungültig
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-forbidden'
        404:
          description: Ein Einsatz mit der angegebenen `foreign_id` existiert nicht.
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/response-not-found'
      security:
        - Accesskey: []

