openapi: 3.0.1
info:
  title: DIVERA 24/7 RESTful Webservice für Messenger-Kanäle
  description: "Die API von DIVERA 24/7 bietet zahlreiche Möglichkeiten, um eigene Dienste anzubinden und Aktionen auszulösen. Für Testzwecke empfehlen wir Ihnen, eine separate Einheit anzulegen. Testeinheiten von zahlenden Kunden werden auf Nachfrage kostenfrei hochgestuft."
  version: 4.1.0
servers:
  - url: https://app.divera247.com
tags:
  - name: CRUD
    description: Die wichtigsten Methoden zum Erstellen, Bearbeiten, Archivieren und Löschen von Messenger-Kanälen
paths:
  /api/v2/message-channels:
    get:
      tags:
        - CRUD
      summary: Methode zum Abrufen aller nicht archivierten Kanäle
      responses:
        200:
          description: successful
          content:
            'application/json':
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      items:
                        type: object
                        description: Liste der einzelnen Kanäle nach ID
                        additionalProperties:
                          $ref: '#/components/schemas/message-channel-result'
                      sorting:
                        type: array
                        description: Reihenfolge der Kanäle, absteigend
                        items:
                          type: integer
                  ucr:
                    type: integer
                    description: ID der UserClusterRelation im aktuellen Request
        403:
          description: Accesskey fehlt oder ungültig
          content: {}
        404:
          description: Objekt nicht gefunden oder Zugriff nicht gestattet
          content: {}
      security:
        - Personal-API-Accesskey: []
    post:
      tags:
        - CRUD
      summary: Methode zum Erstellen eines neuen Kanals
      requestBody:
        description: Parameter im JSON-Format
        content:
          'application/json':
            schema:
              $ref: '#/components/schemas/message-channel-input'
      responses:
        200:
          description: successful
          content:
            'application/json':
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/message-channel-result'
        403:
          description: Accesskey fehlt oder ungültig
          content: {}
        404:
          description: Objekt nicht gefunden oder Zugriff nicht gestattet
          content: {}
      security:
        - Personal-API-Accesskey: []
  /api/v2/message-channels/{id}:
    get:
      tags:
        - CRUD
      summary: Methode zum Anzeigen des Kanals
      parameters:
        - name: id
          in: path
          description: ID des Kanals
          required: true
          schema:
            type: integer
      responses:
        200:
          description: successful
          content:
            'application/json':
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/message-channel-result'
                  ucr:
                    type: integer
                    description: ID der UserClusterRelation im aktuellen Request
        403:
          description: Accesskey fehlt oder ungültig
          content: {}
        404:
          description: Objekt nicht gefunden oder Zugriff nicht gestattet
          content: {}
      security:
        - Personal-API-Accesskey: []
    put:
      tags:
        - CRUD
      summary: Methode zum Bearbeiten des Kanals
      parameters:
        - name: id
          in: path
          description: ID des Kanals
          required: true
          schema: {}
      requestBody:
        description: Parameter im JSON-Format
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/message-channel-input'
        required: true
      responses:
        200:
          description: successful
          content:
            'application/json':
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/message-channel-result'
        403:
          description: Accesskey fehlt oder ungültig
          content: {}
        404:
          description: Objekt nicht gefunden oder Zugriff nicht gestattet
          content: {}
      security:
        - Personal-API-Accesskey: []
    delete:
      tags:
        - CRUD
      summary: Methode zum Löschen des Kanals
      parameters:
        - name: id
          in: path
          description: ID des Kanals
          required: true
          schema: {}
      responses:
        200:
          description: successful
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/success'
        403:
          description: Accesskey fehlt oder ungültig
          content: {}
        404:
          description: Objekt nicht gefunden oder Zugriff nicht gestattet
          content: {}
      security:
        - Personal-API-Accesskey: []
